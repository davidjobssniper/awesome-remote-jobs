name: Daily Job Update

# Chạy mỗi ngày lúc 8:00 AM UTC (khoảng 3h chiều VN)
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run API Fetcher Script
        env:
          KEY_PUBLIC: ${{ secrets.KEY_PUBLIC }}
        run: node update-jobs.js

      - name: Commit and Push Changes        
        run: |
          git config --global user.name "David Stark"
          git config --global user.email "davidjobssniper@users.noreply.github.com"
          git add README.md archive/
          git commit -m "docs: refresh daily job logs $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
